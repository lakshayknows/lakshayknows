<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Interactive Snake Contributions</title>
  <style>
    body {
      margin: 0;
      background-color: #0d1117; /* Dark GitHub theme */
      color: white;
      font-family: sans-serif;
    }
    svg {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    .commit {
      fill: #161b22;
      stroke: #30363d;
    }
    .snake {
      fill: lime;
      stroke: none;
    }
    @media (prefers-color-scheme: light) {
  body {
    background-color: #ffffff;
    color: #000;
  }
  .commit {
    fill: #ebedf0;
    stroke: #d0d7de;
  }
  .snake {
    fill: #0066ff;
  }
}

  </style>
</head>
<body>
  <body>
  <header style="text-align:center; padding: 20px;">
    <img src="https://github.com/lakshayknows.png" width="100" style="border-radius: 50%;">
    <h1>Lakshay's Contribution Snake 🐍</h1>
    <p>
      <a href="https://github.com/lakshayknows" style="color: lime;">GitHub</a> |
      <a href="https://www.linkedin.com/in/lakshayhanda" style="color: lime;">LinkedIn</a> |
      <a href="mailto:your@email.com" style="color: lime;">Email</a>
    </p>
  </header>
  <svg id="snakeGrid"></svg>
  <script src="snake.js"></script>
</body>

</html>
