<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Interactive Snake Contributions</title>
  <style>
    body {
      margin: 0;
      background-color: #0d1117; /* Dark GitHub theme */
      color: white;
      font-family: sans-serif;
    }
    svg {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    .commit {
      fill: #161b22;
      stroke: #30363d;
    }
    .snake {
      fill: lime;
      stroke: none;
    }
    @media (prefers-color-scheme: light) {
  body {
    background-color: #ffffff;
    color: #000;
  }
  .commit {
    fill: #ebedf0;
    stroke: #d0d7de;
  }
  .snake {
    fill: #0066ff;
  }
}

  </style>
</head>
<body>
  <svg id="snakeGrid"></svg>

  <script src="snake.js"></script>
</body>
</html>
